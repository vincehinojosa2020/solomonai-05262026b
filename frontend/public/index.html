<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1B3A5C" />
        <meta name="description" content="Solomon AI - Intelligent church management platform." />
        
        <!-- PWA -->
        <link rel="manifest" href="/manifest.json" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Solomon AI" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        
        <!-- OG Meta Tags for gorgeous link previews -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Solomon AI" />
        <meta property="og:description" content="Intelligent church management platform." />
        <meta property="og:image" content="https://images.unsplash.com/photo-1438232992991-995b7058bbb3?w=1200&h=630&fit=crop" />
        <meta property="og:url" content="https://solomon.ai" />
        <meta property="og:site_name" content="Solomon AI" />
        
        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Solomon AI" />
        <meta name="twitter:description" content="Intelligent church management platform." />
        <meta name="twitter:image" content="https://images.unsplash.com/photo-1438232992991-995b7058bbb3?w=1200&h=630&fit=crop" />
        
        <!-- Apple Touch Icon -->
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
        
        <title>Solomon AI</title>
        
        <style>
            :root {
                --solomon-dark: #0f172a;
                --solomon-blue: #3b82f6;
                --solomon-slate: #1e293b;
            }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
          // One-time forced migration: if old SW exists, redirect to server
          // endpoint that sends Clear-Site-Data header to nuke everything
          (function() {
            if ('serviceWorker' in navigator && !sessionStorage.getItem('sw_cleared')) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                if (regs.length > 0) {
                  sessionStorage.setItem('sw_cleared', '1');
                  window.location.href = '/api/clear-site-data';
                }
              });
            }
          })();
        </script>
    </body>
</html>
