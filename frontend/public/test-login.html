<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solomon AI - Direct Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #1e293b; border-radius: 16px; padding: 40px; width: 420px; max-width: 95vw; }
h1 { font-size: 28px; text-align: center; margin-bottom: 8px; }
h1 span { color: #3b82f6; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-top: 16px; }
input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 15px; outline: none; }
input:focus { border-color: #3b82f6; }
button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 24px; }
button:hover { background: #2563eb; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.log { margin-top: 20px; background: #0f172a; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.log .ok { color: #22c55e; }
.log .err { color: #ef4444; }
.log .info { color: #3b82f6; }
.log .warn { color: #f59e0b; }
.accounts { margin-top: 16px; padding: 12px; background: #0f172a; border-radius: 8px; }
.accounts h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.acct { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
.acct:last-child { border: none; }
.acct button { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
.success-box { background: #052e16; border: 1px solid #22c55e; border-radius: 8px; padding: 16px; margin-top: 16px; text-align: center; }
.success-box a { color: #3b82f6; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <h1>SOLOMON <span>AI</span></h1>
  <div class="subtitle">Direct Login (Diagnostic Mode)</div>
  
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="email" value="member@abundant.church" />
    <label>Password</label>
    <input type="password" id="password" value="Demo2026!" />
    <button type="submit" id="loginBtn">Sign In</button>
  </form>

  <div id="successBox" style="display:none" class="success-box"></div>

  <div class="accounts">
    <h3>Quick Login (click to try)</h3>
    <div class="acct"><span>member@abundant.church</span><button onclick="quickLogin('member@abundant.church')">Try</button></div>
    <div class="acct"><span>admin@abundant.church</span><button onclick="quickLogin('admin@abundant.church')">Try</button></div>
    <div class="acct"><span>admin@solomon.ai</span><button onclick="quickLogin('admin@solomon.ai')">Try</button></div>
    <div class="acct"><span>member@cristoviene.church</span><button onclick="quickLogin('member@cristoviene.church')">Try</button></div>
    <div class="acct"><span>admin@cristoviene.church</span><button onclick="quickLogin('admin@cristoviene.church')">Try</button></div>
    <div class="acct"><span>admin@pottershouse.church</span><button onclick="quickLogin('admin@pottershouse.church')">Try</button></div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
var API = window.location.origin + '/api';
var logEl = document.getElementById('log');

function log(msg, cls) {
  var line = document.createElement('div');
  line.className = cls || '';
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function quickLogin(email) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = 'Demo2026!';
  document.getElementById('loginForm').dispatchEvent(new Event('submit'));
}

// Step 1: Clear any old service workers and caches on load
(async function() {
  log('Clearing old service workers & caches...', 'info');
  try {
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var r of regs) await r.unregister();
      log('Unregistered ' + regs.length + ' service worker(s)', 'ok');
    }
    if ('caches' in window) {
      var keys = await caches.keys();
      for (var k of keys) await caches.delete(k);
      log('Deleted ' + keys.length + ' cache(s)', 'ok');
    }
  } catch(e) { log('Cache clear error: ' + e.message, 'warn'); }
  
  log('API endpoint: ' + API, 'info');
  
  // Quick health check
  try {
    var hRes = await fetch(API + '/health/launch-check');
    var hData = await hRes.json();
    log('Health check: ' + hData.status + ' (HTTP ' + hRes.status + ')', 'ok');
  } catch(e) {
    log('Health check FAILED: ' + e.message, 'err');
  }
})();

// Login handler
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var email = document.getElementById('email').value;
  var pwd = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');
  
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  document.getElementById('successBox').style.display = 'none';
  
  log('---', '');
  log('Attempting login: ' + email, 'info');
  log('POST ' + API + '/auth/login', 'info');
  
  try {
    var startTime = Date.now();
    
    var res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: pwd })
    });
    
    var elapsed = Date.now() - startTime;
    log('Response: HTTP ' + res.status + ' (' + elapsed + 'ms)', res.ok ? 'ok' : 'err');
    
    var text = await res.text();
    log('Body: ' + text.substring(0, 200), res.ok ? 'ok' : 'err');
    
    if (res.ok) {
      var data = JSON.parse(text);
      localStorage.setItem('session_token', data.session_token);
      localStorage.setItem('user_data', text);
      
      log('LOGIN SUCCESS! Token: ' + data.session_token.substring(0, 20) + '...', 'ok');
      log('Name: ' + data.name + ' | Role: ' + data.role, 'ok');
      
      // Test /auth/me with token
      log('Testing /auth/me with Bearer token...', 'info');
      var meRes = await fetch(API + '/auth/me', {
        headers: { 'Authorization': 'Bearer ' + data.session_token }
      });
      log('/auth/me: HTTP ' + meRes.status, meRes.ok ? 'ok' : 'err');
      
      // Show success with link to app
      var dest = data.role === 'member' ? '/portal' : (data.role === 'platform_admin' ? '/platform' : '/dashboard');
      var box = document.getElementById('successBox');
      box.innerHTML = '<div style="color:#22c55e;font-size:18px;margin-bottom:8px">Logged in as ' + data.name + '</div>' +
        '<a href="' + dest + '">Go to ' + dest + ' →</a>';
      box.style.display = 'block';
    } else {
      log('Login failed: ' + text, 'err');
    }
  } catch(err) {
    log('FETCH ERROR: ' + err.name + ': ' + err.message, 'err');
    log('This usually means a network/CORS issue', 'warn');
  }
  
  btn.disabled = false;
  btn.textContent = 'Sign In';
});
</script>
</body>
</html>
