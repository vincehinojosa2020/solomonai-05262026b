# Security CI — runs on every pull request + nightly on main.
# Blocks merge if any of the following regresses:
#   1. Backend deps below the SECURITY_FLOOR in tests/test_security_baseline.py
#   2. Denylisted packages (python-jose, ecdsa) re-introduced
#   3. pip-audit finds a known-exploitable CVE in any installed dep
#   4. Snyk Code (SAST) or Snyk Open Source (SCA) finds new HIGH/CRITICAL
#   5. Frontend yarn audit finds HIGH/CRITICAL in direct deps
#
# Requires the following GitHub secrets:
#   SNYK_TOKEN — from https://app.snyk.io/account

name: security

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'   # nightly UTC

jobs:
  backend-baseline:
    name: Backend dep baseline (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest packaging pip-audit
      - name: Enforce SECURITY_FLOOR / DENYLIST / runtime
        run: pytest backend/tests/test_security_baseline.py -v
      - name: pip-audit (block on known-exploitable CVEs)
        run: pip-audit --strict --requirement backend/requirements.txt

  snyk-backend:
    name: Snyk SCA + Code (backend)
    runs-on: ubuntu-latest
    if: ${{ env.SNYK_TOKEN != '' }}
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions/setup@master
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r backend/requirements.txt
      - name: Snyk Open Source (SCA)
        run: snyk test --file=backend/requirements.txt --severity-threshold=high --fail-on=upgradable
      - name: Snyk Code (SAST)
        run: snyk code test --severity-threshold=high

  snyk-frontend:
    name: Snyk Code (frontend) + yarn audit
    runs-on: ubuntu-latest
    if: ${{ env.SNYK_TOKEN != '' }}
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: snyk/actions/setup@master
      - run: cd frontend && yarn install --frozen-lockfile
      - name: Snyk Code (frontend SAST — XSS, open redirect, etc.)
        working-directory: frontend
        run: snyk code test --severity-threshold=high
      - name: yarn audit (HIGH/CRITICAL only)
        working-directory: frontend
        run: yarn npm audit --severity high --environment production || exit 1
